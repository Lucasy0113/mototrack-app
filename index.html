<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <title>MotoTrack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<!-- 👤 Botón y Panel de Usuario -->
<button id="user-menu-btn" class="user-menu-btn" aria-label="Menú de usuario">👤</button>

<div id="user-drawer" class="drawer">
  <div class="drawer-content">
    <button id="close-drawer" class="close-btn">&times;</button>
    <h2 style="margin:0 0 0.5rem;">Mi Cuenta</h2>
    <p id="user-email-display" class="user-info"></p>
    
    <hr class="drawer-divider">
    <h3 style="margin:0 0 0.5rem;">Cambiar Contraseña</h3>
    <form id="change-pass-form">
      <input type="password" id="current-pass" placeholder="Contraseña actual" required minlength="6">
      <input type="password" id="new-pass" placeholder="Nueva contraseña" required minlength="6">
      <input type="password" id="confirm-pass" placeholder="Confirmar nueva contraseña" required minlength="6">
      <button type="submit" class="btn-primary">Actualizar</button>
      <p id="pass-msg" class="msg"></p>
    </form>
    
    <hr class="drawer-divider">
    <button id="logout-btn" class="btn-danger">🚪 Cerrar Sesión</button>
  </div>
  <div class="drawer-overlay"></div>
</div>
<body>
  <header>
    <h1>🏍️ MotoTrack</h1>
    <button id="theme-toggle" title="Cambiar tema">🌗</button>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="fuel">⛽ Combustible</button>
      <button class="tab-btn" data-tab="maint">🔧 Mantenimiento</button>
    </nav>
  </header>

  <main id="app">
    <section id="summary" class="summary-card"></section>
    <section id="list-container" class="list-container"></section>
    <div id="pagination" class="pagination"></div>
  </main>

  <button id="add-btn" class="fab" aria-label="Agregar registro">+</button>

  <dialog id="modal">
    <form id="record-form">
      <h2 id="modal-title">Nuevo Registro</h2>
      <div id="form-fields"></div>
      <div class="modal-actions">
        <button type="button" id="cancel-btn">Cancelar</button>
        <button type="submit">Guardar</button>
      </div>
    </form>
  </dialog>
  <!-- Supabase Client (CDN ligero) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js?v=6"></script>
  <script src="app.js?v=21"></script>
  <!-- 🔄 Indicador de Carga -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Procesando...</p>
  </div>
</body>
</html>
